name: Scrape ETA Ranking

on:
  # 수동 실행
  workflow_dispatch:
  # 매일 UTC 02:00 (KST 11:00) 자동 실행
  schedule:
    - cron: '0 15 * * *'

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore TWETA/TWETA.csproj

      - name: Build
        run: dotnet build TWETA/TWETA.csproj -c Release --no-restore

      - name: Install Playwright browsers
        run: dotnet exec TWETA/bin/Release/net10.0/playwright.ps1 install chromium --with-deps
        shell: bash
        continue-on-error: true

      - name: Install Playwright browsers (fallback)
        run: pwsh TWETA/bin/Release/net10.0/playwright.ps1 install chromium --with-deps

      - name: Run scraper
        run: dotnet run --project TWETA/TWETA.csproj -c Release --no-build

      - name: Commit and push results
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add eta_ranking.json
          git diff --cached --quiet || git commit -m "Update eta_ranking.json [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
